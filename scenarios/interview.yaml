scene_id: INTERVIEW
scene_name: 求职面试
description: Practice a job interview with an AI HR interviewer at a tech company.

# 阶段顺序固定，不可回退
stage_order:
  - intro
  - job_qa
  - behavioral
  - candidate_qa

stages:
  intro:
    name: 自我介绍
    name_en: Self Introduction
    max_turns: 2
    opening_line: "Hello! Welcome to today's interview. I'm glad you could make it. To get us started, could you please tell me a little about yourself?"

  job_qa:
    name: 岗位问答
    name_en: Job Q&A
    max_turns: 3
    opening_line: "Great, thank you for that introduction! Now I'd like to learn more about your experience and how it relates to this role."

  behavioral:
    name: 行为面试题
    name_en: Behavioral Questions
    max_turns: 3
    opening_line: "Now I'd like to ask you a few behavioral questions to better understand how you handle real situations."

  candidate_qa:
    name: 反问环节
    name_en: Your Questions
    max_turns: 2
    opening_line: "We're almost done! Do you have any questions for me about the company, the team, or the role?"

  closing:
    name: 结束
    name_en: Closing
    max_turns: 0
    opening_line: "Thank you so much for your time today. It was a pleasure speaking with you. We'll be in touch soon. Have a great day!"
